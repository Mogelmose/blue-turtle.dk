<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spilleaften</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/loginstyle.css" />
</head>

<script src="../javascript/script.js"></script>
<body class="body">

  <header class="header">
  <img src="../billeder/logo.png" alt="Logo" />
  <h1 class="banner-title">Spilleaften</h1>
</header>

<script>
  function playLoginSound() {
    const loginSound = new Audio('../sound/pissegodt.mp3');
    loginSound.play().catch(error => {
      console.log('Autoplay af lyd blev forhindret:', error);
    });
  }
  window.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('login') === 'success') {
      playLoginSound();
    }
  });
</script>

  <main class="main">
    <h1>Log venligst ind</h1>

    <div class="profiles" id="profileSelection">
      <div class="profile" onclick="showLogin('Andreas')">
        <img src="../billeder/andreas.jpg" alt="Profil 1" />
        <div class="profile-name">Andreas</div>
      </div>
      <div class="profile" onclick="showLogin('Mads')">
        <img src="../billeder/mads.jpg" alt="Profil 2" />
        <div class="profile-name">Mads</div>
      </div>
      <div class="profile" onclick="showLogin('Oliver')">
        <img src="../billeder/oliver.jpg" alt="Profil 3" />
        <div class="profile-name">Oliver</div>
      </div>
      <div class="profile" onclick="showLogin('Goby')">
        <img src="../billeder/goby.jpg" alt="Profil 4" />
        <div class="profile-name">Goby</div>
      </div>
      <div class="profile" onclick="showLogin('Patrick')">
        <img src="../billeder/patrick.jpg" alt="Profil 5" />
        <div class="profile-name">Patrick</div>
      </div>
      <div class="profile" onclick="showLogin('Bruun')">
        <img src="../billeder/bruun.jpg" alt="Profil 6" />
        <div class="profile-name">Bruun</div>
      </div>
      <div class="profile" onclick="showLogin('Thomas')">
        <img src="../billeder/thomas.jpg" alt="Profil 7" />
        <div class="profile-name">Thomas</div>
      </div>
      <div class="profile" onclick="showLogin('Tonni')">
        <img src="../billeder/tonni.jpg" alt="Profil 8" />
        <div class="profile-name">Tonni</div>
      </div>
      <div class="profile" onclick="showLogin('Nøhr')">
        <img src="../billeder/nøhr.jpg" alt="Profil 9" />
        <div class="profile-name">Nøhr</div>
      </div>
      <div class="profile" onclick="showLogin('Schildt')">
        <img src="../billeder/schildt.jpg" alt="Profil 10" />
        <div class="profile-name">Schildt</div>
      </div>
    </div>
    
	<form id="loginForm" class="hidden">
  <label for="bruger">Bruger</label>
  <input type="text" id="bruger" name="bruger" readonly />

  <label for="kode">Adgangskode</label>
  <input type="password" id="kode" name="kode" />
  
  <p id="fejlbesked" style="color: red; margin-top: 10px;"></p>

  <button type="submit">Log Ind</button>
  <button type="button" onclick="goBack()">Annuller</button>
</form>
  </main>

</body>
</html>
